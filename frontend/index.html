<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevFlow – AI Developer Productivity</title>
  <link rel="stylesheet" href="style.css"/>
  <!-- Favicon via SVG data URI -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234f6ef7'/><text x='6' y='23' font-family='sans-serif' font-weight='700' font-size='16' fill='white'>DF</text></svg>"/>
</head>
<body>

  <!-- ── App Shell ──────────────────────────── -->
  <div class="app-layout">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">DF</div>
        <div>
          <div class="logo-text">DevFlow</div>
          <div class="logo-badge">Smart Dashboard</div>
        </div>
      </div>

      <div class="sidebar-nav">
        <div class="nav-section-label">Main</div>

        <button class="nav-item" data-page="dashboard" onclick="navigate('dashboard')">
          <!-- Grid icon -->
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="1" width="6" height="6" rx="1.5"/>
            <rect x="9" y="1" width="6" height="6" rx="1.5"/>
            <rect x="1" y="9" width="6" height="6" rx="1.5"/>
            <rect x="9" y="9" width="6" height="6" rx="1.5"/>
          </svg>
          Dashboard
        </button>

        <button class="nav-item" data-page="tasks" onclick="navigate('tasks')">
          <!-- Checklist icon -->
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M5 4h9M5 8h9M5 12h9"/>
            <polyline points="1,3 2.5,4.5 4.5,2"/>
            <polyline points="1,7 2.5,8.5 4.5,6"/>
            <polyline points="1,11 2.5,12.5 4.5,10"/>
          </svg>
          Task Planner
          <span class="nav-badge" id="overdue-badge">2</span>
        </button>

        <button class="nav-item" data-page="code" onclick="navigate('code')">
          <!-- Code icon -->
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="4,5 1,8 4,11"/>
            <polyline points="12,5 15,8 12,11"/>
            <line x1="9" y1="3" x2="7" y2="13"/>
          </svg>
          Code Workspace
        </button>

        <button class="nav-item" data-page="learning" onclick="navigate('learning')">
          <!-- Graduation icon -->
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1 4l7-3 7 3-7 3-7-3z"/>
            <path d="M4.5 5.5v4.5a7 4 0 0 0 7 0V5.5"/>
            <path d="M15 4v5"/>
          </svg>
          Learning Tracker
        </button>

        <div class="nav-section-label" style="margin-top:8px">Workspace</div>

        <button class="nav-item" onclick="showToast('GitHub sync coming soon!','info')">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          GitHub Sync
        </button>

        <button class="nav-item" onclick="showToast('Settings coming soon!','info')">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="3"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
          </svg>
          Settings
        </button>
      </div>

      <div class="sidebar-footer">
        <div class="user-card">
          <div class="avatar">AK</div>
          <div class="user-info">
            <div class="user-name">Meera Singh</div>
            <div class="user-role">Full Stack Dev · Level 14</div>
          </div>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-muted)">
            <circle cx="7" cy="7" r="1"/><circle cx="7" cy="3" r="1"/><circle cx="7" cy="11" r="1"/>
          </svg>
        </div>
      </div>
    </nav>

    <!-- Main Area -->
    <div class="main-content">

      <!-- Top Bar -->
      <header class="topbar">
        <!-- Mobile menu -->
        <button class="btn btn-icon btn-ghost" id="menu-btn" style="display:none" onclick="document.getElementById('sidebar').classList.toggle('open')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="1" y1="4" x2="15" y2="4"/><line x1="1" y1="8" x2="15" y2="8"/><line x1="1" y1="12" x2="15" y2="12"/>
          </svg>
        </button>

        <div class="search-box" onclick="showToast('Search coming soon!','info')">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6.5" cy="6.5" r="5"/>
            <line x1="10.5" y1="10.5" x2="15" y2="15"/>
          </svg>
          Search tasks, code, docs...
          <span style="margin-left:auto;font-size:10px;background:var(--bg-overlay);padding:2px 5px;border-radius:3px;color:var(--text-muted)">⌘K</span>
        </div>

        <div class="topbar-spacer"></div>

        <!-- Streak badge -->
        <div style="display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--amber-dim);border:1px solid rgba(245,158,11,0.2);border-radius:var(--radius-sm)">
          <span style="font-size:13px">🔥</span>
          <span style="font-size:12px;font-weight:600;color:var(--amber)">28 day streak</span>
        </div>

        <!-- Notification bell -->
        <button class="btn btn-icon btn-ghost" style="position:relative" onclick="showToast('3 new notifications','info')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M8 1a5 5 0 0 1 5 5v2.5l1.5 2H1.5L3 8.5V6a5 5 0 0 1 5-5z"/>
            <path d="M6.5 13a1.5 1.5 0 0 0 3 0"/>
          </svg>
          <span style="position:absolute;top:4px;right:4px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid var(--bg-surface)"></span>
        </button>

        <div class="avatar" style="cursor:pointer" onclick="navigate('learning')">AK</div>
      </header>

      <!-- Dynamic Page Content -->
      <div id="page-content"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="script.js"></script>
</body>
</html>
